services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      USE_MOCK_GPU_DATA: ${USE_MOCK_GPU_DATA:-false}
      FRONTEND_ORIGIN: http://localhost:5173
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend
