<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>무비프렌드 · 인트로</title>
<style>
  :root{
    --bg-deep:#07070c;
    --accent:#ffb454;
    --accent2:#ff6b6b;
    --accent3:#7c9fff;
    --paper:#fff7ea;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;width:100%;height:100%;overflow:hidden;
    background:var(--bg-deep);
    font-family:"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",-apple-system,BlinkMacSystemFont,sans-serif;
    color:#fff;
  }
  .stage{
    position:fixed;inset:0;
    background:
      radial-gradient(ellipse 120% 80% at 50% 110%, rgba(255,180,84,0.10), transparent 60%),
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(124,159,255,0.12), transparent 60%),
      var(--bg-deep);
  }
  /* subtle film grain / vignette */
  .vignette{
    position:fixed;inset:0;pointer-events:none;z-index:50;
    box-shadow: inset 0 0 18vw rgba(0,0,0,0.75);
    mix-blend-mode:multiply;
  }
  .scene{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;
    transition:opacity 1s ease;
    text-align:center;
    padding:6vh 6vw;
  }
  .scene.active{opacity:1;pointer-events:auto;}

  /* ---------- progress dots ---------- */
  .dots{position:fixed;bottom:4vh;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:60;}
  .dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.25);transition:all .4s ease;}
  .dot.on{background:var(--accent);width:22px;border-radius:5px;}

  /* ================= SCENE 1 : chaos ================= */
  #scene1 .chip{
    position:absolute;
    padding:8px 16px;border-radius:999px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    font-size:14px;color:rgba(255,255,255,0.55);
    white-space:nowrap;
    animation:drift 6s ease-in-out infinite;
  }
  @keyframes drift{
    0%,100%{transform:translateY(0) rotate(var(--r,0deg));}
    50%{transform:translateY(-14px) rotate(var(--r,0deg));}
  }
  #scene1 .headline{
    position:relative;z-index:5;
    font-size:clamp(26px,4.4vw,46px);
    font-weight:800;
    letter-spacing:-0.02em;
    opacity:0;
    animation:fadeUp 1s ease forwards .4s;
    text-shadow:0 6px 30px rgba(0,0,0,0.6);
  }
  #scene1 .sub{
    position:relative;z-index:5;margin-top:16px;
    font-size:clamp(14px,1.8vw,18px);
    color:rgba(255,255,255,0.6);
    opacity:0;animation:fadeUp 1s ease forwards 1s;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

  /* ================= SCENE 2 : popcorn friend ================= */
  #scene2{overflow:hidden;}
  .popcorn-layer{position:absolute;inset:0;overflow:hidden;z-index:1;}
  .kernel{
    position:absolute;bottom:-10%;
    font-size:28px;
    opacity:0;
    animation:popRise linear forwards;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,0.4));
  }
  @keyframes popRise{
    0%{transform:translate(0,0) rotate(0deg) scale(.6);opacity:0;}
    8%{opacity:1;}
    70%{opacity:1;}
    100%{transform:translate(var(--dx,0px),-130vh) rotate(var(--rot,320deg)) scale(1);opacity:0;}
  }
  #scene2 .content{position:relative;z-index:5;}
  #scene2 .badge{
    display:inline-flex;align-items:center;gap:8px;
    background:rgba(255,180,84,0.12);border:1px solid rgba(255,180,84,0.4);
    color:var(--accent);padding:6px 16px;border-radius:999px;font-size:13px;font-weight:600;
    opacity:0;animation:fadeUp .8s ease forwards .2s;
  }
  #scene2 .headline{
    margin-top:22px;font-size:clamp(26px,4.2vw,44px);font-weight:800;letter-spacing:-0.02em;
    opacity:0;animation:fadeUp .9s ease forwards .6s;
  }
  #scene2 .headline .accent{color:var(--accent);}
  #scene2 .sub{
    margin-top:14px;font-size:clamp(14px,1.8vw,18px);color:rgba(255,255,255,0.6);
    opacity:0;animation:fadeUp .9s ease forwards 1.1s;
  }

  /* ================= SCENE 3 : natural chat ================= */
  .phone{
    width:min(360px,84vw);
    background:linear-gradient(180deg,#111319,#0b0c10);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:28px;
    padding:20px 16px 22px;
    box-shadow:0 30px 60px rgba(0,0,0,0.5);
  }
  .phone-title{font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:14px;text-align:left;padding-left:4px;}
  .bubble-row{display:flex;margin:8px 0;opacity:0;transform:translateY(10px);}
  .bubble-row.me{justify-content:flex-end;}
  .bubble-row.show{animation:bubbleIn .5s ease forwards;}
  @keyframes bubbleIn{to{opacity:1;transform:translateY(0);}}
  .bubble{
    max-width:78%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.45;text-align:left;
  }
  .bubble-row.me .bubble{background:var(--accent3);color:#0b0c10;border-bottom-right-radius:4px;font-weight:600;}
  .bubble-row.ai .bubble{background:#1c1f27;color:#f1f1f1;border-bottom-left-radius:4px;}
  .typing{display:inline-flex;gap:4px;padding:12px 14px;background:#1c1f27;border-radius:16px;border-bottom-left-radius:4px;}
  .typing span{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.5);animation:blink 1.2s infinite ease-in-out;}
  .typing span:nth-child(2){animation-delay:.15s;}
  .typing span:nth-child(3){animation-delay:.3s;}
  @keyframes blink{0%,80%,100%{opacity:.2;transform:translateY(0);}40%{opacity:1;transform:translateY(-3px);}}
  .movie-card{
    display:flex;align-items:center;gap:10px;margin-top:6px;padding:10px;border-radius:14px;
    background:linear-gradient(135deg,rgba(255,180,84,0.18),rgba(255,107,107,0.12));
    border:1px solid rgba(255,180,84,0.3);
  }
  .movie-card .poster{width:34px;height:46px;border-radius:6px;background:linear-gradient(160deg,var(--accent),var(--accent2));flex:none;}
  .movie-card .meta{text-align:left;}
  .movie-card .meta b{display:block;font-size:13px;}
  .movie-card .meta span{font-size:11px;color:rgba(255,255,255,0.55);}
  #scene3 .caption{margin-top:26px;font-size:clamp(15px,2vw,20px);font-weight:700;opacity:0;}
  #scene3.active .caption{animation:fadeUp .8s ease forwards 2.6s;}

  /* ================= SCENE 4 : character chat ================= */
  .avatars{display:flex;gap:22px;margin-bottom:22px;}
  .avatar{
    width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:26px;background:#171921;border:1px solid rgba(255,255,255,0.1);
    opacity:0;transform:scale(.7);transition:none;
  }
  .avatar.show{animation:popIn .5s cubic-bezier(.34,1.56,.64,1) forwards;}
  @keyframes popIn{to{opacity:1;transform:scale(1);}}
  .avatar.pick{box-shadow:0 0 0 3px var(--accent);}
  #scene4 .caption{margin-top:24px;font-size:clamp(15px,2vw,20px);font-weight:700;opacity:0;}
  #scene4.active .caption{animation:fadeUp .8s ease forwards 2.4s;}

  /* ================= SCENE 5 : logo / cta ================= */
  #scene5 .logo-pop{font-size:56px;opacity:0;animation:logoPop .8s cubic-bezier(.34,1.56,.64,1) forwards .1s;}
  @keyframes logoPop{0%{opacity:0;transform:translateY(20px) scale(.6) rotate(-12deg);}100%{opacity:1;transform:translateY(0) scale(1) rotate(0deg);}}
  #scene5 .brand{margin-top:14px;font-size:clamp(30px,5vw,52px);font-weight:900;letter-spacing:-0.03em;opacity:0;animation:fadeUp .8s ease forwards .5s;}
  #scene5 .tagline{margin-top:10px;font-size:clamp(14px,1.8vw,18px);color:rgba(255,255,255,0.6);opacity:0;animation:fadeUp .8s ease forwards .9s;}
  #scene5 .cta{
    margin-top:30px;padding:14px 34px;border-radius:999px;border:none;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#1a1005;font-weight:800;font-size:15px;letter-spacing:-0.01em;
    opacity:0;animation:fadeUp .8s ease forwards 1.3s, glow 2s ease-in-out infinite 2.1s;
    cursor:default;
  }
  @keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(255,180,84,0.5);}50%{box-shadow:0 0 24px 4px rgba(255,180,84,0.35);}}

  /* ================= SCENE 6 : implementation video ================= */
  #scene6{padding-top:5vh;padding-bottom:8vh;}
  #scene6 .video-heading{margin:0 0 18px;font-size:clamp(28px,4.5vw,48px);font-weight:900;letter-spacing:-0.03em;opacity:0;}
  #scene6 .video-sub{margin:0 0 24px;color:rgba(255,255,255,0.58);font-size:clamp(13px,1.6vw,16px);opacity:0;}
  #scene6.active .video-heading{animation:fadeUp .8s ease forwards .1s;}
  #scene6.active .video-sub{animation:fadeUp .8s ease forwards .35s;}
  .video-frame{
    position:relative;width:min(960px,88vw);aspect-ratio:16/9;overflow:hidden;
    border-radius:22px;background:#020203;border:1px solid rgba(255,180,84,0.28);
    box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 50px rgba(255,180,84,.08);
    opacity:0;transform:translateY(18px) scale(.98);
  }
  #scene6.active .video-frame{animation:videoIn .9s ease forwards .55s;}
  @keyframes videoIn{to{opacity:1;transform:translateY(0) scale(1);}}
  .video-frame video{display:block;width:100%;height:100%;object-fit:contain;background:#000;}
  .video-label{
    position:absolute;top:14px;left:16px;z-index:2;padding:6px 11px;border-radius:999px;
    background:rgba(7,7,12,.72);border:1px solid rgba(255,255,255,.16);
    color:rgba(255,255,255,.8);font-size:11px;letter-spacing:.08em;pointer-events:none;
    backdrop-filter:blur(8px);
  }
</style>
</head>
<body>
  <div class="stage"></div>
  <div class="vignette"></div>

  <!-- SCENE 1 : too many movies -->
  <section class="scene" id="scene1">
    <div class="chips"></div>
    <h1 class="headline">세상엔 너무 많은 영화들이 있어요</h1>
    <p class="sub">오늘 밤, 뭘 봐야 할지 또 30분째 고민 중이라면</p>
  </section>

  <!-- SCENE 2 : popcorn friend -->
  <section class="scene" id="scene2">
    <div class="popcorn-layer"></div>
    <div class="content">
      <span class="badge">🍿 팝! 등장</span>
      <h1 class="headline">나한테 <span class="accent">딱 맞는 영화</span>를<br>찾아줄 친구가 나타났어요</h1>
      <p class="sub">고민은 팝콘처럼 톡톡 튀어 사라지게</p>
    </div>
  </section>

  <!-- SCENE 3 : natural conversation -->
  <section class="scene" id="scene3">
    <div class="phone">
      <div class="phone-title">무비프렌드</div>
      <div id="chatBody"></div>
    </div>
    <p class="caption">추천도 대화하듯, 자연스럽게</p>
  </section>

  <!-- SCENE 4 : talk with movie characters -->
  <section class="scene" id="scene4">
    <div class="avatars">
      <div class="avatar" data-e="🧙">🧙</div>
      <div class="avatar" data-e="🦸">🦸</div>
      <div class="avatar" data-e="🕵️">🕵️</div>
      <div class="avatar" data-e="👻">👻</div>
    </div>
    <div class="phone">
      <div class="phone-title">영화 속 캐릭터와의 대화</div>
      <div id="charBody"></div>
    </div>
    <p class="caption">영화 캐릭터와도, 자유롭게 대화하세요</p>
  </section>

  <!-- SCENE 5 : logo / CTA -->
  <section class="scene" id="scene5">
    <div class="logo-pop">🍿</div>
    <div class="brand">무비프렌드</div>
    <p class="tagline">대화로 찾는, 나만의 영화</p>
    <button class="cta">지금 시작하기</button>
  </section>

  <!-- SCENE 6 : implementation video -->
  <section class="scene" id="scene6">
    <h1 class="video-heading">구현영상</h1>
    <p class="video-sub">무비프렌드의 주요 기능을 영상으로 확인해 보세요</p>
    <div class="video-frame">
      <span class="video-label">MOVIE FRIEND · DEMO</span>
      <video id="implementationVideo" controls muted playsinline preload="metadata">
        <source src="implementation_video.mov" type="video/quicktime">
        브라우저가 영상 재생을 지원하지 않습니다.
      </video>
    </div>
  </section>

  <div class="dots">
    <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
  </div>

<script>
(function(){
  const scenes = [...document.querySelectorAll('.scene')];
  const dots = [...document.querySelectorAll('.dot')];
  const durations = [3400, 4600, 5200, 5200, 4600]; // 마지막 구현영상 장면에서는 자동 전환을 멈춘다.
  let idx = 0;
  let timer = null;

  // ---------- Scene 1: floating genre chips ----------
  const genreWords = ['로맨스','SF','스릴러','코미디','다큐멘터리','애니메이션','공포','액션','드라마','판타지','미스터리','10,000+ 개의 영화'];
  const chipLayer = document.querySelector('#scene1 .chips');
  function buildChips(){
    chipLayer.innerHTML = '';
    genreWords.forEach((w,i)=>{
      const el = document.createElement('span');
      el.className = 'chip';
      el.textContent = w;
      const top = 8 + Math.random()*84;
      const left = 4 + Math.random()*82;
      const rot = (Math.random()*10-5).toFixed(1);
      el.style.top = top+'%';
      el.style.left = left+'%';
      el.style.setProperty('--r', rot+'deg');
      el.style.animationDelay = (Math.random()*3).toFixed(2)+'s';
      el.style.animationDuration = (5+Math.random()*3).toFixed(2)+'s';
      chipLayer.appendChild(el);
    });
  }

  // ---------- Scene 2: popcorn burst ----------
  const popLayer = document.querySelector('#scene2 .popcorn-layer');
  function spawnPopcorn(){
    popLayer.innerHTML = '';
    const n = 34;
    for(let i=0;i<n;i++){
      const k = document.createElement('div');
      k.className = 'kernel';
      k.textContent = '🍿';
      const left = Math.random()*100;
      const dx = (Math.random()*140-70).toFixed(0)+'px';
      const rot = (300+Math.random()*120).toFixed(0)+'deg';
      const dur = (2.2+Math.random()*1.8).toFixed(2)+'s';
      const delay = (Math.random()*1.6).toFixed(2)+'s';
      const size = (18+Math.random()*20).toFixed(0)+'px';
      k.style.left = left+'%';
      k.style.fontSize = size;
      k.style.setProperty('--dx', dx);
      k.style.setProperty('--rot', rot);
      k.style.animationDuration = dur;
      k.style.animationDelay = delay;
      popLayer.appendChild(k);
    }
  }

  // ---------- Scene 3: natural recommendation chat ----------
  const chatScript = [
    {who:'me', text:'오늘 기분이 좀 꿀꿀해... 위로되는 영화 없을까?'},
    {who:'typing'},
    {who:'ai', text:'그런 날엔 잔잔하게 웃다가 마음이 따뜻해지는 영화가 좋죠 🎬'},
    {who:'ai', card:{title:'오늘, 우리',meta:'드라마 · 108분 · 잔잔한 위로'}},
    {who:'me', text:'오 좋다, 바로 볼래!'}
  ];
  const chatBody = document.getElementById('chatBody');
  let chatTimers = [];
  function runChat(){
    chatBody.innerHTML = '';
    chatTimers.forEach(t=>clearTimeout(t));
    chatTimers = [];
    let t = 200;
    chatScript.forEach(step=>{
      chatTimers.push(setTimeout(()=>{
        if(step.who === 'typing'){
          const row = document.createElement('div');
          row.className = 'bubble-row ai';
          row.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
          chatBody.appendChild(row);
          requestAnimationFrame(()=>row.classList.add('show'));
          chatTimers.push(setTimeout(()=>row.remove(), 900));
        } else {
          const row = document.createElement('div');
          row.className = 'bubble-row ' + (step.who === 'me' ? 'me' : 'ai');
          if(step.card){
            row.innerHTML = '<div class="bubble"><div class="movie-card"><div class="poster"></div><div class="meta"><b>'+step.card.title+'</b><span>'+step.card.meta+'</span></div></div></div>';
          } else {
            row.innerHTML = '<div class="bubble">'+step.text+'</div>';
          }
          chatBody.appendChild(row);
          requestAnimationFrame(()=>row.classList.add('show'));
        }
      }, t));
      t += (step.who === 'typing') ? 1000 : 750;
    });
  }

  // ---------- Scene 4: character conversation ----------
  const charScript = [
    {pick:0, who:'me', text:'너라면 이 위기를 어떻게 헤쳐나갈래?'},
    {who:'char', emoji:'🧙', text:'지팡이만 있다면 문제없지! 주문 하나면 충분해 ✨'},
    {pick:2, who:'me', text:'그럼 넌 단서부터 찾을 것 같은데?'},
    {who:'char', emoji:'🕵️', text:'현장엔 항상 답이 남아있는 법이거든요.'}
  ];
  const charBody = document.getElementById('charBody');
  const avatarEls = [...document.querySelectorAll('#scene4 .avatar')];
  const implementationVideo = document.getElementById('implementationVideo');
  let charTimers = [];
  function runCharacterChat(){
    charBody.innerHTML = '';
    avatarEls.forEach(a=>a.classList.remove('show','pick'));
    charTimers.forEach(t=>clearTimeout(t));
    charTimers = [];
    avatarEls.forEach((a,i)=>{
      charTimers.push(setTimeout(()=>a.classList.add('show'), 150 + i*120));
    });
    let t = 900;
    charScript.forEach(step=>{
      charTimers.push(setTimeout(()=>{
        if(typeof step.pick === 'number'){
          avatarEls.forEach(a=>a.classList.remove('pick'));
          avatarEls[step.pick].classList.add('pick');
        }
        const row = document.createElement('div');
        row.className = 'bubble-row ' + (step.who === 'me' ? 'me' : 'ai');
        const prefix = step.emoji ? step.emoji+' ' : '';
        row.innerHTML = '<div class="bubble">'+prefix+step.text+'</div>';
        charBody.appendChild(row);
        requestAnimationFrame(()=>row.classList.add('show'));
      }, t));
      t += 780;
    });
  }

  // ---------- scene sequencing ----------
  function showScene(i){
    scenes.forEach(s=>s.classList.remove('active'));
    dots.forEach(d=>d.classList.remove('on'));
    scenes[i].classList.add('active');
    dots[i].classList.add('on');
    if(i === 0) buildChips();
    if(i === 1) spawnPopcorn();
    if(i === 2) runChat();
    if(i === 3) runCharacterChat();
    if(i === scenes.length - 1){
      implementationVideo.currentTime = 0;
      implementationVideo.play().catch(()=>{});
    } else {
      implementationVideo.pause();
    }
  }

  function loop(){
    showScene(idx);
    if(idx === scenes.length - 1) return;
    timer = setTimeout(()=>{
      idx += 1;
      loop();
    }, durations[idx]);
  }

  loop();
})();
</script>
</body>
</html>
